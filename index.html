<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stolice Polski - Ewolucja Kolorów</title>
    <style>
        :root {
            --glow: #00d2ff;
            --accent: #f1c40f;
            --correct: #27ae60;
            --wrong: #e74c3c;
            --bg-color: #1e272e;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            transition: background 1.5s ease;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 480px;
            text-align: center;
            position: relative;
        }

        .fade-in { animation: zoomIn 0.5s ease-out forwards; }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        #start-screen h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--glow);
        }

        /* Styl dla inputa imienia */
        .name-input {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--glow);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
            width: 80%;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }

        #quiz-screen, #result-screen { display: none; }

        .progress-container {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            margin-bottom: 40px;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00d2ff, #00ff88);
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        #voivodeship {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        button {
            padding: 20px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: rgba(255,255,255,0.2);
            border-color: var(--glow);
            transform: translateY(-3px);
        }

        .btn-correct {
            background: var(--correct) !important;
            border-color: #fff !important;
            animation: pulse 0.4s ease;
        }
        .btn-wrong {
            background: var(--wrong) !important;
            animation: shake 0.4s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .start-btn {
            background: var(--glow);
            color: black;
            font-size: 1.5rem;
            padding: 20px 50px;
            box-shadow: 0 0 30px var(--glow);
            margin-top: 20px;
        }

        /* Świecące imię na koniec */
        .player-name-glow {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--glow), 0 0 30px var(--glow);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .big-percent { font-size: 5rem; font-weight: 900; color: var(--accent); margin: 5px 0; }
        
        #highscores {
            margin-top: 15px;
            text-align: left;
            font-size: 0.9rem;
            max-height: 180px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
        }
        .score-entry {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 8px 0;
        }
        .score-entry span:nth-child(1) { flex: 1; font-weight: bold; color: var(--glow); }
        .score-entry span:nth-child(2) { width: 60px; text-align: center; }
        .score-entry span:nth-child(3) { width: 60px; text-align: right; }
    </style>
</head>
<body>

<div id="start-screen" class="glass-card fade-in">
    <h1>QUIZ<br>STOLICE</h1>
    <p>Podaj swoje imię:</p>
    <input type="text" id="player-name-input" class="name-input" placeholder="Twoje imię..." maxlength="15">
    <br>
    <button class="start-btn" onclick="startGame()">ROZPOCZNIJ GRĘ</button>
</div>

<div id="quiz-screen" class="glass-card">
    <div class="progress-container"><div id="progress-bar"></div></div>
    <div style="font-size: 0.9rem; opacity: 0.6; display: flex; justify-content: space-between;">
        <span>WOJEWÓDZTWO</span>
        <span id="timer">CZAS: 0s</span>
    </div>
    <div id="voivodeship">---</div>
    <div class="options-grid" id="options"></div>
    <div style="margin-top: 25px; opacity: 0.8;">PUNKTY: <span id="score">0</span></div>
</div>

<div id="result-screen" class="glass-card">
    <div id="final-player-name" class="player-name-glow">IMIĘ</div>
    <div class="big-percent" id="final-percent">0%</div>
    <p id="final-text" style="font-size: 1.2rem; margin: 5px 0;"></p>
    <p id="final-time" style="color: var(--accent); font-weight: bold;"></p>
    
    <div id="highscores-container">
        <h3 style="font-size: 1.1rem; margin-bottom: 10px; border-bottom: 2px solid var(--glow); padding-bottom: 5px;">TOP 5 GRACZY</h3>
        <div id="highscores"></div>
    </div>

    <button class="start-btn" onclick="location.reload()" style="padding: 15px 30px; font-size: 1.1rem; width: 100%;">ZAGRAJ JESZCZE RAZ</button>
</div>

<script>
    const data = [
        {v: "Dolnośląskie", c: "Wrocław"}, {v: "Kujawsko-Pomorskie", c: "Bydgoszcz / Toruń"},
        {v: "Lubelskie", c: "Lublin"}, {v: "Lubuskie", c: "Gorzów Wlkp. / Zielona Góra"},
        {v: "Łódzkie", c: "Łódź"}, {v: "Małopolskie", c: "Kraków"},
        {v: "Mazowieckie", c: "Warszawa"}, {v: "Opolskie", c: "Opole"},
        {v: "Podkarpackie", c: "Rzeszów"}, {v: "Podlaskie", c: "Białystok"},
        {v: "Pomorskie", c: "Gdańsk"}, {v: "Śląskie", c: "Katowice"},
        {v: "Świętokrzyskie", c: "Kielce"}, {v: "Warmińsko-Mazurskie", c: "Olsztyn"},
        {v: "Wielkopolskie", c: "Poznań"}, {v: "Zachodniopomorskie", c: "Szczecin"}
    ];

    let current = 0;
    let score = 0;
    let playerName = "";
    let quiz = [...data].sort(() => Math.random() - 0.5);
    
    let startTime;
    let timerInterval;

    const backgroundColors = [
        "#1e272e", "#2c3e50", "#34495e", "#2980b9", 
        "#8e44ad", "#9b59b6", "#d35400", "#e67e22"
    ];

    function startGame() {
        const input = document.getElementById('player-name-input');
        playerName = input.value.trim() || "Anonim";
        
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
        
        loadQuestion();
    }

    function updateTimer() {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('timer').innerText = `CZAS: ${elapsed}s`;
    }

    function loadQuestion() {
        if(current >= quiz.length) return showResults();
        
        const colorIdx = Math.floor(current / 2);
        document.body.style.background = backgroundColors[colorIdx] || "#1e272e";

        const q = quiz[current];
        document.getElementById('voivodeship').innerText = q.v;
        document.getElementById('progress-bar').style.width = (current / 16 * 100) + "%";
        
        const container = document.getElementById('options');
        container.innerHTML = '';

        let choices = [q.c];
        while(choices.length < 3) {
            let r = data[Math.floor(Math.random()*16)].c;
            if(!choices.includes(r)) choices.push(r);
        }
        choices.sort(() => Math.random() - 0.5);

        choices.forEach(text => {
            const btn = document.createElement('button');
            btn.innerText = text;
            btn.onclick = () => handleChoice(btn, text, q.c);
            container.appendChild(btn);
        });
    }

    function handleChoice(btn, selected, correct) {
        const btns = document.querySelectorAll('#options button');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if(selected === correct) {
            btn.classList.add('btn-correct');
            score++;
            document.getElementById('score').innerText = score;
        } else {
            btn.classList.add('btn-wrong');
            btns.forEach(b => {
                if(b.innerText === correct) b.classList.add('btn-correct');
            });
        }

        setTimeout(() => {
            current++;
            loadQuestion();
        }, 1000);
    }

    function showResults() {
        clearInterval(timerInterval);
        const finalTimeSeconds = Math.floor((Date.now() - startTime) / 1000);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.body.style.background = "#000"; 
        
        const p = Math.round((score/16)*100);
        
        // Wyświetlanie imienia i wyników
        document.getElementById('final-player-name').innerText = playerName;
        document.getElementById('final-percent').innerText = p + "%";
        document.getElementById('final-text').innerText = `Punkty: ${score} / 16`;
        document.getElementById('final-time').innerText = `Czas: ${finalTimeSeconds}s`;

        saveAndDisplayScores(playerName, score, finalTimeSeconds);
    }

    function saveAndDisplayScores(name, newScore, newTime) {
        // Topek zapisuje się w pamięci przeglądarki (localStorage)
        let history = JSON.parse(localStorage.getItem('quiz_top_scores')) || [];
        
        history.push({
            name: name,
            score: newScore,
            time: newTime
        });

        // Sortowanie: Punkty w dół, potem Czas w górę
        history.sort((a, b) => b.score - a.score || a.time - b.time);

        // Zostawiamy tylko top 5
        history = history.slice(0, 5);
        localStorage.setItem('quiz_top_scores', JSON.stringify(history));

        const hsContainer = document.getElementById('highscores');
        hsContainer.innerHTML = history.map((s, idx) => `
            <div class="score-entry">
                <span>${idx + 1}. ${s.name}</span>
                <span>${s.score}/16</span>
                <span>${s.time}s</span>
            </div>
        `).join('');
    }
</script>

</body>
</html>
